services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ashbi-platform
    restart: unless-stopped
    env_file:
      - .env
    # ⚠️ Production overrides — no database/redis ports exposed to host
    # Postgres and Redis should run in separate stacks without host port mappings.
    # Use internal Docker networks only — never expose data stores to the internet.
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ashbi-platform.rule=Host(`hub.ashbi.ca`)"
      - "traefik.http.routers.ashbi-platform.entrypoints=https"
      - "traefik.http.routers.ashbi-platform.tls=true"
      - "traefik.http.routers.ashbi-platform.tls.certresolver=letsencrypt"
      - "traefik.http.services.ashbi-platform.loadbalancer.server.port=3002"
      - "traefik.http.routers.ashbi-platform-http.rule=Host(`hub.ashbi.ca`)"
      - "traefik.http.routers.ashbi-platform-http.entrypoints=http"
      - "coolify.managed=true"

networks:
  coolify:
    external: true