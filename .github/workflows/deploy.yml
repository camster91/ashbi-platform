name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.26.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/agency-hub

            echo "Resetting working tree to clean state..."
            git reset --hard HEAD

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing backend dependencies..."
            npm install --legacy-peer-deps

            echo "Building frontend..."
            cd web && npm install --legacy-peer-deps && npm run build && cd ..
            mkdir -p dist && cp -r web/dist/* dist/

            echo "Generating Prisma client..."
            DATABASE_URL=$(grep DATABASE_URL .env | cut -d= -f2-) npx prisma generate
            DATABASE_URL=$(grep DATABASE_URL .env | cut -d= -f2-) npx prisma db push

            echo "Restarting containers..."
            docker compose down
            docker compose up -d

            echo "Deployment complete!"
            docker compose ps
