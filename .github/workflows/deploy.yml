name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.26.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            DEPLOY_DIR="/var/www/agency-hub"
            REPO_URL="https://github.com/camster91/ashbi-platform.git"

            cd "$DEPLOY_DIR"

            # Ensure the ashbi-platform remote exists
            if ! git remote get-url ashbi-platform >/dev/null 2>&1; then
              echo "Adding ashbi-platform remote..."
              git remote add ashbi-platform "$REPO_URL"
            else
              git remote set-url ashbi-platform "$REPO_URL"
            fi

            echo "Resetting working tree to clean state..."
            git reset --hard HEAD
            git clean -fd

            echo "Pulling latest code from ashbi-platform/main..."
            git fetch ashbi-platform main
            git checkout -B main ashbi-platform/main

            echo "Installing backend dependencies..."
            npm install --legacy-peer-deps

            echo "Building frontend..."
            cd web && npm install --legacy-peer-deps && npm run build && cd ..
            mkdir -p dist && cp -r web/dist/* dist/

            # Extract DATABASE_URL from the running Coolify-managed container
            echo "Extracting DATABASE_URL from running container..."
            DATABASE_URL=$(docker exec ashbi-platform printenv DATABASE_URL 2>/dev/null || true)

            if [ -z "$DATABASE_URL" ]; then
              echo "ERROR: Could not determine DATABASE_URL from container."
              exit 1
            fi

            echo "Generating Prisma client..."
            DATABASE_URL="$DATABASE_URL" npx prisma generate

            echo "Applying database migrations..."
            DATABASE_URL="$DATABASE_URL" npx prisma migrate deploy

            # Restart the Coolify-managed container to pick up code changes
            echo "Restarting Coolify-managed container..."
            docker restart ashbi-platform

            echo "Waiting for app to start..."
            sleep 5

            echo "Health check..."
            curl -sf https://hub.ashbi.ca/api/health && echo " - OK" || echo " - FAILED"

            echo "Deployment complete!"