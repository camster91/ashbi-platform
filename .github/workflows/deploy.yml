name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.26.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e

            DEPLOY_DIR="/var/www/agency-hub"
            REPO_URL="https://github.com/camster91/ashbi-platform.git"

            cd "$DEPLOY_DIR"

            # Ensure the ashbi-platform remote exists
            if ! git remote get-url ashbi-platform >/dev/null 2>&1; then
              echo "Adding ashbi-platform remote..."
              git remote add ashbi-platform "$REPO_URL"
            else
              git remote set-url ashbi-platform "$REPO_URL"
            fi

            echo "Resetting working tree to clean state..."
            git reset --hard HEAD
            git clean -fd

            echo "Pulling latest code from ashbi-platform/main..."
            git fetch ashbi-platform main
            git checkout -B main ashbi-platform/main

            # Find the running container (Coolify may prefix the name)
            CONTAINER=$(docker ps --filter "name=ashbi-platform" --format "{{.Names}}" | head -1)
            if [ -z "$CONTAINER" ]; then
              CONTAINER=$(docker ps --filter "name=agency-hub" --format "{{.Names}}" | head -1)
            fi
            echo "Using container: ${CONTAINER:-not found}"

            # Extract .env from the running container if available, otherwise use existing file
            echo "Environment synchronization..."
            if [ -n "$CONTAINER" ]; then
              docker exec "$CONTAINER" env > /var/www/agency-hub/.env.remote 2>/dev/null || true
              # Merge remote env with local if needed, but primary goal is keeping DATABASE_URL
              if [ -f "/var/www/agency-hub/.env.remote" ]; then
                export DATABASE_URL=$(grep '^DATABASE_URL=' /var/www/agency-hub/.env.remote | cut -d'=' -f2-)
                echo "Using DATABASE_URL from running container."
              fi
            fi

            # Fallback to local .env if still missing
            if [ -z "$DATABASE_URL" ]; then
              echo "Falling back to existing .env file..."
              export DATABASE_URL=$(grep '^DATABASE_URL=' /var/www/agency-hub/.env | cut -d'=' -f2-)
            fi

            if [ -z "$DATABASE_URL" ]; then
              echo "ERROR: Could not determine DATABASE_URL."
              exit 1
            fi

            echo "Building new image first (to ensure migrations run on latest schema)..."
            docker compose -f docker-compose.prod.yml build app

            echo "Applying database migrations via temporary container..."
            # Run migration inside the docker network
            docker compose -f docker-compose.prod.yml run --rm app npx prisma migrate deploy

            echo "Stopping and removing old container..."
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            echo "Starting new container..."
            docker compose -f docker-compose.prod.yml up -d app

            echo "Waiting for app to start and pass health check..."
            HEALTH_CHECK_URL="https://hub.ashbi.ca/api/health"
            MAX_RETRIES=12
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -sf "$HEALTH_CHECK_URL"; then
                echo " - OK"
                break
              fi
              echo " - Waiting... ($RETRY_COUNT)"
              sleep 5
              RETRY_COUNT=$((RETRY_COUNT+1))
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo " - FAILED after 60 seconds"
              echo "Checking container logs..."
              docker logs "$CONTAINER" --tail 100
              exit 1
            fi

            echo "Deployment complete!"