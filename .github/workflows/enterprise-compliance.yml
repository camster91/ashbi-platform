name: Enterprise Compliance & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compliance:
    name: Lint & Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Linting
        run: npm run lint
        
      - name: Multi-Tenancy Compliance Scan
        run: |
          # Ensure no direct prisma imports in routes (must use request.prisma)
          # Grep returns 1 if no matches found, which is what we want
          ! grep -r "import prisma from '../config/db.js'" src/routes/
          
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run Backend Tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          
  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: cd web && npm install
      - name: Run Frontend Tests
        run: cd web && npx vitest run --coverage
