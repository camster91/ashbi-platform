services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ashbi-platform
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://ashbi:${DB_PASSWORD}@postgres:5432/ashbi?schema=public
      - REDIS_URL=redis://redis:6379
    networks:
      - ashbi-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ashbi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ashbi
      POSTGRES_USER: ashbi
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/pgvector-init.sh:/docker-entrypoint-initdb.d/pgvector-init.sh
    # ⚠️ Do NOT expose database ports in production — comment out the ports mapping below
    # Only the app container needs database access via the internal Docker network
    ports:
      - "5432:5432"
    networks:
      - ashbi-network

  redis:
    image: redis:7-alpine
    container_name: ashbi-redis
    restart: unless-stopped
    # ⚠️ Do NOT expose Redis ports in production — comment out the ports mapping below
    # Only the app container needs Redis access via the internal Docker network
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - ashbi-network

volumes:
  pgdata:
  redisdata:

networks:
  ashbi-network:
    driver: bridge